name: Copy shared files to new repositories
# 新リポジトリ作成時に CLAUDE.md / .claude/agents/ / .claude/commands/ / .claude/skills/ を自動コピーする
# workflow_dispatch（手動）または repository_dispatch（外部トリガー）に対応
on:
  repository_dispatch:
    types: [repo-created]
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'コピー先リポジトリ名 (例: my-new-repo)'
        required: true

jobs:
  copy-shared-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github repository
        uses: actions/checkout@v4

      - name: Copy shared files to target repository
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ORG: Murasekthk0126
          TARGET_REPO: ${{ github.event.inputs.target_repo || github.event.client_payload.repo_name }}
        run: |
          if [ -z "$TARGET_REPO" ]; then
            echo "エラー: コピー先リポジトリが指定されていません"
            exit 1
          fi

          echo "=== コピー先: $ORG/$TARGET_REPO ==="

          gh api /repos/$ORG/$TARGET_REPO --jq '.full_name' 2>/dev/null || {
            echo "エラー: リポジトリ $ORG/$TARGET_REPO が見つかりません"
            exit 1
          }

          # ファイルを1つコピーする関数
          copy_file() {
            local SRC="$1"
            local DEST="$2"

            [ -f "$SRC" ] || { echo "  スキップ: $SRC"; return; }

            local ENCODED
            ENCODED=$(base64 -w 0 "$SRC")

            local EXISTING_SHA
            EXISTING_SHA=$(gh api /repos/$ORG/$TARGET_REPO/contents/$DEST \
              --jq '.sha' 2>/dev/null || echo "")

            if [ -n "$EXISTING_SHA" ]; then
              gh api /repos/$ORG/$TARGET_REPO/contents/$DEST \
                --method PUT \
                --field message="chore: sync $DEST from .github repository" \
                --field content="$ENCODED" \
                --field sha="$EXISTING_SHA" \
                --silent \
                && echo "  ✓ 更新: $DEST" || echo "  ✗ 失敗: $DEST"
            else
              gh api /repos/$ORG/$TARGET_REPO/contents/$DEST \
                --method PUT \
                --field message="chore: add $DEST from .github repository" \
                --field content="$ENCODED" \
                --silent \
                && echo "  ✓ 作成: $DEST" || echo "  ✗ 失敗: $DEST"
            fi
          }

          # ディレクトリ内の全 .md を再帰的にコピーする関数
          copy_dir() {
            local DIR="$1"
            if [ -d "$DIR" ]; then
              find "$DIR" -name "*.md" | while read -r FILE; do
                copy_file "$FILE" "$FILE"
              done
            fi
          }

          # CLAUDE.md
          echo "--- CLAUDE.md ---"
          copy_file "CLAUDE.md" "CLAUDE.md"

          # .claude/agents/
          echo "--- .claude/agents/ ---"
          copy_dir ".claude/agents"

          # .claude/commands/
          echo "--- .claude/commands/ ---"
          copy_dir ".claude/commands"

          # .claude/skills/
          echo "--- .claude/skills/ ---"
          copy_dir ".claude/skills"

          echo "=== コピー完了 ==="
