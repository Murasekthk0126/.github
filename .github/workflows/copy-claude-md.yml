name: Copy shared files to new repositories
# 新リポジトリ作成時に CLAUDE.md と .claude/agents/ を自動コピーする
# 手動実行（workflow_dispatch）または外部トリガー（repository_dispatch）に対応
on:
  repository_dispatch:
    types: [repo-created]
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'コピー先リポジトリ名 (例: my-new-repo)'
        required: true

jobs:
  copy-shared-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github repository
        uses: actions/checkout@v4

      - name: Copy CLAUDE.md and .claude/agents/ to target repository
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ORG: Murasekthk0126
          TARGET_REPO: ${{ github.event.inputs.target_repo || github.event.client_payload.repo_name }}
        run: |
          if [ -z "$TARGET_REPO" ]; then
            echo "エラー: コピー先リポジトリが指定されていません"
            exit 1
          fi

          echo "=== コピー先: $ORG/$TARGET_REPO ==="

          # コピー先リポジトリの存在確認
          gh api /repos/$ORG/$TARGET_REPO --jq '.full_name' 2>/dev/null || {
            echo "エラー: リポジトリ $ORG/$TARGET_REPO が見つかりません"
            exit 1
          }

          # ファイルを1つコピーする関数
          copy_file() {
            local SRC="$1"      # ローカルパス（checkout済み）
            local DEST="$2"     # コピー先リポジトリ内のパス

            if [ ! -f "$SRC" ]; then
              echo "  スキップ: $SRC が見つかりません"
              return
            fi

            local ENCODED
            ENCODED=$(base64 -w 0 "$SRC")

            local EXISTING_SHA
            EXISTING_SHA=$(gh api /repos/$ORG/$TARGET_REPO/contents/$DEST \
              --jq '.sha' 2>/dev/null || echo "")

            if [ -n "$EXISTING_SHA" ]; then
              gh api /repos/$ORG/$TARGET_REPO/contents/$DEST \
                --method PUT \
                --field message="chore: sync $DEST from .github repository" \
                --field content="$ENCODED" \
                --field sha="$EXISTING_SHA" \
                --silent \
                && echo "  ✓ 更新: $DEST" || echo "  ✗ 失敗: $DEST"
            else
              gh api /repos/$ORG/$TARGET_REPO/contents/$DEST \
                --method PUT \
                --field message="chore: add $DEST from .github repository" \
                --field content="$ENCODED" \
                --silent \
                && echo "  ✓ 作成: $DEST" || echo "  ✗ 失敗: $DEST"
            fi
          }

          # CLAUDE.md をコピー
          echo "--- CLAUDE.md ---"
          copy_file "CLAUDE.md" "CLAUDE.md"

          # .claude/agents/ 配下のエージェントファイルをすべてコピー
          echo "--- .claude/agents/ ---"
          if [ -d ".claude/agents" ]; then
            for AGENT_FILE in .claude/agents/*.md; do
              FILENAME=$(basename "$AGENT_FILE")
              copy_file "$AGENT_FILE" ".claude/agents/$FILENAME"
            done
          else
            echo "  スキップ: .claude/agents/ ディレクトリが見つかりません"
          fi

          echo "=== コピー完了 ==="
